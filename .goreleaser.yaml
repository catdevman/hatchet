# goreleaser v2 config. Release flow: tag vX.Y.Z, push, run `goreleaser release`.
# NOTE: not yet exercised end-to-end (no goreleaser in the dev environment) —
# validate with `goreleaser check` and a `--snapshot` build before first release.
version: 2

project_name: hatchet

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/hatchet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README.md
      - third_party/axe/LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

